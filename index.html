<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Teacher Angela's Battle Quiz!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-dark: #0a0a1a;
            --p1-color: #ff2e63; 
            --p2-color: #08d9d6; 
            --accent-glow: #7000ff; 
            --panel-bg: rgba(16, 16, 32, 0.8);
            --text-light: #ffffff;
            --hero-shadow: 0 0 20px rgba(112, 0, 255, 0.4);
            --correct-color: #00ff88;
            --wrong-color: #ff2e63;
        }
        
        body { 
            margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; 
            background: url('battle.gif') center/cover no-repeat fixed; 
            color: var(--text-light); 
            overflow: hidden; 
            -webkit-user-select: none; user-select: none;
            width: 100vw; height: 100vh;
            /* Support for multi-touch gestures */
            touch-action: none; 
        }

        .global-controls {
            position: fixed; top: 15px; right: 20px;
            display: flex; align-items: center; gap: 10px; z-index: 9999;
        }

        .volume-control-wrapper {
            display: flex; align-items: center; background: var(--panel-bg);
            border-radius: 30px; padding: 5px 15px; border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px); transition: all 0.3s;
        }
        
        #volume-slider { width: 0; opacity: 0; transition: all 0.3s; cursor: pointer; accent-color: var(--accent-glow); margin-left: 0; }
        .volume-control-wrapper:hover #volume-slider { width: 100px; opacity: 1; margin-left: 10px; }

        .quit-btn-container { position: fixed; top: 15px; left: 20px; z-index: 9999; }

        .screen { 
            display: none; position: absolute; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10; box-sizing: border-box; 
            background: radial-gradient(circle, rgba(10,10,26,0.4) 0%, rgba(10,10,26,0.8) 100%);
        }
        
        .main-title {
            font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 85px; 
            text-align: center; margin-bottom: 30px; line-height: 1.1;
            background: linear-gradient(to right, var(--p1-color), var(--p2-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(112, 0, 255, 0.3)); letter-spacing: -2px;
        }

        #intro-screen { display: flex; }
        #char-select-screen { padding: 10px; justify-content: flex-start; padding-top: 60px; }
        
        .char-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; 
            width: 95%; max-width: 1400px; margin: 0 auto; flex-grow: 1; align-content: center;
        }
        
        .char-card { 
            background: var(--panel-bg); border: 3px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 10px; cursor: pointer; text-align: center; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            aspect-ratio: 1 / 1; backdrop-filter: blur(10px); box-shadow: var(--hero-shadow);
            touch-action: manipulation;
        }
        
        .char-card img { width: 90%; height: 80%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); transform: scaleX(-1); }
        .char-card:hover { transform: scale(1.05) translateY(-5px); border-color: var(--accent-glow); box-shadow: 0 0 30px var(--accent-glow); }
        .char-card.selected-p1 { border: 4px solid var(--p1-color); background: rgba(255,46,99,0.2); box-shadow: 0 0 30px var(--p1-color); }
        .char-card.selected-p2 { border: 4px solid var(--p2-color); background: rgba(8,217,214,0.2); box-shadow: 0 0 30px var(--p2-color); }

        .bottom-action-bar { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; width: 100%; }

        .mode-selector { display: flex; gap: 10px; }
        .mode-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            color: white; padding: 15px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Fredoka';
        }
        .mode-btn.active { border-color: var(--accent-glow); background: var(--accent-glow); box-shadow: 0 0 15px var(--accent-glow); }

        #game-screen { display: none; flex-direction: row; background: transparent; }
        .player-side { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; transition: background 0.3s; }
        
        .health-bar-container { 
            width: 85%; height: 30px; background: #111; border-radius: 6px; margin: 85px auto 10px auto;
            overflow: hidden; border: 2px solid #333; z-index: 200; box-shadow: inset 0 0 10px #000;
        }
        
        .health-fill { 
            width: 100%; height: 100%; background: linear-gradient(90deg, #00f2ff, #0061ff); 
            transition: width 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }
        
        .damage-flash-screen { background: rgba(255, 46, 99, 0.3) !important; }
        .damage-flash-bar { animation: bar-hit 0.4s; }
        @keyframes bar-hit { 0% { background: #fff; } 100% { background: #ff2e63; } }

        .avatar-wrapper { width: 100%; height: 400px; margin: 0 auto; position: relative; z-index: 100; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .avatar-display { width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center bottom; animation: rocking 3s ease-in-out infinite; }

        @keyframes rocking { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-12px) rotate(1deg); } }
        .shiver { animation: shiver-effect 0.1s linear infinite !important; }
        @keyframes shiver-effect { 0% { transform: translate(-6px, -3px); } 25% { transform: translate(6px, 0px); } 100% { transform: translate(0px, 0px); } }

        .quiz-container { padding: 10px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 10; margin-bottom: 25px; transition: opacity 0.5s, filter 0.5s; width: 100%; }
        .quiz-container.waiting { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

        .question-box { font-size: 24px; text-align: center; margin-bottom: 15px; min-height: 50px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; width: 90%; border-left: 5px solid var(--accent-glow); color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .quiz-content-row { display: flex; gap: 15px; width: 90%; align-items: center; justify-content: center; }

        .q-image-square { flex: 0 0 180px; width: 180px; height: 180px; background: rgba(0,0,0,0.5); border: 2px solid var(--accent-glow); border-radius: 12px; display: none; background-size: contain; background-position: center; background-repeat: no-repeat; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-grow: 1; }
        .option-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80px; max-height: 120px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-family: 'Fredoka'; font-size: 20px; font-weight: bold; cursor: pointer; background: linear-gradient(180deg, #2a2a4a 0%, #16162d 100%); color: #fff; transition: 0.2s; overflow: hidden; gap: 5px; touch-action: manipulation; }
        .option-btn:hover { background: var(--accent-glow); transform: translateY(-2px); border-color: #fff; }

        .opt-img-game { width: auto; height: 100%; max-height: 60px; object-fit: contain; border-radius: 4px; pointer-events: none; }
        .option-btn.btn-correct { background: var(--correct-color) !important; color: #000 !important; border-color: #fff !important; box-shadow: 0 0 20px var(--correct-color); }
        .option-btn.btn-wrong { background: var(--wrong-color) !important; color: #fff !important; box-shadow: 0 0 20px var(--wrong-color); }

        .round-btn { width: 50px; height: 50px; border-radius: 50%; background: none; color: white; border: none; font-size: 24px; cursor: pointer; touch-action: manipulation; }
        
        .btn { padding: 15px 35px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Fredoka'; font-size: 18px; background: linear-gradient(45deg, var(--accent-glow), #4e00b3); color: white; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 20px rgba(112,0,255,0.4); transition: 0.3s; touch-action: manipulation; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        /* ARMORY MODAL SCROLLING LOGIC */
        #settings-modal { 
            display: none; position: fixed; z-index: 10000; inset: 0; 
            background: rgba(0,0,0,0.95); 
            overflow-y: auto; /* Enable scrolling on the modal overlay */
            -webkit-overflow-scrolling: touch; 
            touch-action: auto; /* Allow touch scrolling here */
        }
        .modal-content { 
            background: #1a1a2e; color: #fff; margin: 20px auto; padding: 30px; 
            border-radius: 24px; max-width: 900px; position: relative; 
            border: 1px solid var(--accent-glow); 
            touch-action: auto; 
        }
        
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 35px; cursor: pointer; color: var(--p1-color); font-weight: bold; }
        .sentence-row { background: #252545; padding: 20px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #3d3d6d; position: relative; }
        
        .row-controls { position: absolute; top: 15px; right: 20px; display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .control-icon { cursor: pointer; transition: 0.2s; }
        .control-icon:hover { transform: scale(1.2); filter: brightness(1.2); }

        .armory-img-preview { width: 80px; height: 80px; border: 1px dashed #666; border-radius: 8px; background-size: contain; background-position: center; background-repeat: no-repeat; cursor: pointer; position: relative; background-color: #111; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .opt-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .opt-mini-preview { width: 40px; height: 40px; border: 1px solid #444; border-radius: 4px; background-size: contain; background-position: center; background-repeat: no-repeat; background-color: #000; cursor: pointer; flex-shrink: 0; }
        .winner-char-display { width: 250px; height: 250px; margin-top: 20px; background-size: contain; background-repeat: no-repeat; background-position: center; filter: drop-shadow(0 0 20px var(--accent-glow)); }

        input[type="text"] { touch-action: auto; } /* Allow typing/scrolling inside inputs */
    </style>
</head>
<body>

    <audio id="bg-music" loop src="battlebg.mp3"></audio>
    <audio id="sfx-p1-attack" src="p1.mp3"></audio>
    <audio id="sfx-p2-attack" src="p2.mp3"></audio>
    <audio id="sfx-p1-lose" src="l1.mp3"></audio>
    <audio id="sfx-p2-lose" src="l2.mp3"></audio>

    <div class="global-controls">
        <button class="round-btn" onpointerdown="toggleFullscreen()" style="background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.2); width: 55px; height: 55px; border-radius: 50%; backdrop-filter: blur(5px);">⛶</button>
        <div class="volume-control-wrapper">
            <button class="round-btn" id="music-toggle" onpointerdown="toggleMusic()">🔊</button>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="changeVolume(this.value)">
        </div>
    </div>

    <div id="intro-screen" class="screen">
        <h1 class="main-title">TEACHER ANGELA'S<br>BATTLE QUIZ</h1>
        <div style="display:flex; gap:20px;">
            <button class="btn" style="background: linear-gradient(45deg, #00c853, #b2ff59); color:#000;" onpointerdown="showCharSelect()">Enter Arena ▶</button>
            <button class="btn" style="background: #333;" onpointerdown="openSettings()">Armory ⚙</button>
        </div>
    </div>

    <div id="char-select-screen" class="screen">
        <div class="quit-btn-container"><button class="btn" style="background:#333;" onpointerdown="goBackToStart()">⬅ Retreat</button></div>
        <h2 style="font-size:36px; margin: 10px 0; color: #fff; text-transform:uppercase; letter-spacing:3px;">Select Your Fighters</h2>
        <div style="display: flex; gap: 30px; margin-bottom: 15px;">
            <div id="p1-indicator" style="color: var(--p1-color); font-weight: bold; font-size: 22px; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 50px; border: 2px solid var(--p1-color);">P1: SCANNING...</div>
            <div id="p2-indicator" style="color: var(--p2-color); font-weight: bold; font-size: 22px; background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 50px; border: 2px solid var(--p2-color);">P2: WAITING...</div>
        </div>
        <div class="char-grid" id="char-grid"></div>
        <div class="bottom-action-bar">
            <div class="mode-selector">
                <button id="mode-simul" class="mode-btn active" onpointerdown="setMode('simultaneous')">SIMULTANEOUS</button>
                <button id="mode-turn" class="mode-btn" onpointerdown="setMode('turn')">TURN-BASED</button>
            </div>
            <button id="start-battle-btn" class="btn" style="visibility:hidden; padding: 20px 60px; font-size:24px;" onpointerdown="saveAndStart()">INITIALIZE COMBAT!</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="quit-btn-container"><button class="btn" style="background:rgba(0,0,0,0.6); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);" onpointerdown="goBackToStart()">⬅ QUIT</button></div>
        <div class="player-side" id="side-0">
            <div class="health-bar-container"><div id="hp-0" class="health-fill"></div></div>
            <div class="avatar-wrapper" id="wrapper-0"><div class="avatar-display" id="avatar-0"></div></div>
            <div id="name-0" style="text-align:center; font-weight:bold; font-size:22px; color:var(--p1-color); text-transform:uppercase;">Striker One</div>
            <div class="quiz-container" id="quiz-cont-0">
                <div class="question-box" id="q-0">...</div>
                <div class="quiz-content-row">
                    <div id="img-q-0" class="q-image-square"></div>
                    <div class="options-grid" id="opt-0"></div>
                </div>
            </div>
        </div>
        <div class="player-side" id="side-1">
            <div class="health-bar-container"><div id="hp-1" class="health-fill"></div></div>
            <div class="avatar-wrapper" id="wrapper-1"><div class="avatar-display" id="avatar-1"></div></div>
            <div id="name-1" style="text-align:center; font-weight:bold; font-size:22px; color:var(--p2-color); text-transform:uppercase;">Striker Two</div>
            <div class="quiz-container" id="quiz-cont-1">
                <div class="question-box" id="q-1">...</div>
                <div class="quiz-content-row">
                    <div id="img-q-1" class="q-image-square"></div>
                    <div class="options-grid" id="opt-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen" style="background: rgba(0,0,0,0.9);">
        <h1 id="winner-announcement" class="main-title" style="font-size: 80px;"></h1>
        <div id="winner-char-display" class="winner-char-display"></div>
        <button class="btn" style="margin-top:40px; padding: 25px 60px; font-size:28px;" onpointerdown="goBackToStart()">Restart Protocol</button>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <span class="close-x" onpointerdown="closeSettings()">×</span>
            <h2 style="color: var(--accent-glow); margin-top: 0; text-align: center; text-transform: uppercase;">Question Database</h2>
            <div style="display: flex; gap: 10px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; margin-bottom: 20px; justify-content: center;">
                <button class="btn" style="background:#2196F3; font-size:14px;" onpointerdown="exportData()">Export Bank</button>
                <button class="btn" style="background:#4CAF50; font-size:14px;" onpointerdown="document.getElementById('import-file').click()">Import Bank</button>
                <button class="btn" style="background:var(--p1-color); font-size:14px;" onpointerdown="resetData()">Wipe Memory</button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(this)">
            </div>
            <div id="sentence-container"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn" onpointerdown="addSentenceRow()" style="flex: 1; background: #252545; border: 1px solid var(--accent-glow);">+ New Entry</button>
                <button class="btn" onpointerdown="closeSettingsAndSync()" style="flex: 1;">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_BANK = [
            { text: "The quick brown fox ___ over the dog.", options: ["jumps", "runs", "eats", "sleeps"], optionImages: [null, null, null, null], correct: "jumps", correctIdx: 0, image: null },
            { text: "Which color is the sun?", options: ["yellow", "green", "blue", "purple"], optionImages: [null, null, null, null], correct: "yellow", correctIdx: 0, image: null },
            { text: "I ___ English every day.", options: ["study", "dance", "swim", "cry"], optionImages: [null, null, null, null], correct: "study", correctIdx: 0, image: null }
        ];

        let sentenceBank = JSON.parse(JSON.stringify(DEFAULT_BANK));
        let activeQuestionPool = [];
        let currentQuestionIndex = 0;
        let playerSelection = [null, null];
        let gameData = [{ hp: 100 }, { hp: 100 }];
        let damagePerHit = 20; 
        let gameMode = 'simultaneous';
        let currentTurn = 0;
        let isGameOver = false;
        let isProcessingAnswer = [false, false];

        window.onload = () => { renderCharSelect(); renderSentenceBank(); const bgm = document.getElementById('bg-music'); bgm.volume = 0.5; };

        function setMode(m) {
            gameMode = m;
            document.getElementById('mode-simul').classList.toggle('active', m === 'simultaneous');
            document.getElementById('mode-turn').classList.toggle('active', m === 'turn');
        }

        function renderCharSelect() {
            const grid = document.getElementById('char-grid');
            let html = "";
            for(let i=1; i<=21; i++) {
                html += `<div class="char-card" id="char-${i}" onpointerdown="selectChar(${i})"><img src="s${i}.gif"><div style="font-size:14px; margin-top:8px; color:rgba(255,255,255,0.7); font-weight:bold; letter-spacing:1px;">UNIT-${i.toString().padStart(2, '0')}</div></div>`;
            }
            grid.innerHTML = html;
        }

        function selectChar(num) {
            if (playerSelection[0] === null) {
                playerSelection[0] = num; document.getElementById(`char-${num}`).classList.add('selected-p1');
                document.getElementById('p1-indicator').innerText = "P1: ONLINE";
                document.getElementById('p2-indicator').innerText = "P2: SCANNING...";
            } else if (playerSelection[1] === null && playerSelection[0] !== num) {
                playerSelection[1] = num; document.getElementById(`char-${num}`).classList.add('selected-p2');
                document.getElementById('p2-indicator').innerText = "P2: ONLINE";
                document.getElementById('start-battle-btn').style.visibility = 'visible';
            }
        }

        function showCharSelect() { 
            document.getElementById('intro-screen').style.display = 'none'; 
            document.getElementById('char-select-screen').style.display = 'flex'; 
        }

        function saveAndStart() {
            isGameOver = false; isProcessingAnswer = [false, false];
            syncActivePool();
            
            const totalQuestions = activeQuestionPool.length || 1;
            if (gameMode === 'simultaneous') {
                damagePerHit = 100 / totalQuestions;
            } else {
                damagePerHit = 100 / (totalQuestions / 2);
            }

            document.getElementById('char-select-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            gameData = [{ hp: 100 }, { hp: 100 }];
            document.getElementById('avatar-0').style.backgroundImage = `url(s${playerSelection[0]}.gif)`;
            document.getElementById('avatar-1').style.backgroundImage = `url(s${playerSelection[1]}.gif)`;
            applyMirroring(0, document.getElementById('wrapper-0')); 
            applyMirroring(1, document.getElementById('wrapper-1'));
            updateHP(0, 0); updateHP(1, 0);
            loadUniversalQuestion();
            if(gameMode === 'turn') { currentTurn = 0; updateTurnUI(); }
            else { 
                document.getElementById('quiz-cont-0').classList.remove('waiting'); 
                document.getElementById('quiz-cont-1').classList.remove('waiting'); 
            }
        }

        function syncActivePool() {
            activeQuestionPool = JSON.parse(JSON.stringify(sentenceBank)).sort(() => Math.random() - 0.5);
            currentQuestionIndex = 0;
        }

        function updateTurnUI() {
            if(gameMode !== 'turn' || isGameOver) return;
            document.getElementById('quiz-cont-0').classList.toggle('waiting', currentTurn !== 0);
            document.getElementById('quiz-cont-1').classList.toggle('waiting', currentTurn !== 1);
        }

        function applyMirroring(pIdx, el) {
            const scale = (pIdx === 0) ? -1 : 1;
            el.style.transform = `scaleX(${scale})`;
        }

        function loadUniversalQuestion() {
            if (isGameOver) return;
            if (currentQuestionIndex >= activeQuestionPool.length) {
                const winnerIdx = gameData[0].hp >= gameData[1].hp ? 0 : 1;
                endGame(winnerIdx);
                return;
            }
            const qObj = activeQuestionPool[currentQuestionIndex];
            [0, 1].forEach(pIdx => {
                document.getElementById(`q-${pIdx}`).innerText = qObj.text;
                const imgBox = document.getElementById(`img-q-${pIdx}`);
                imgBox.style.display = qObj.image ? 'block' : 'none';
                if(qObj.image) imgBox.style.backgroundImage = `url(${qObj.image})`;

                let optObjs = qObj.options.map((text, idx) => ({ 
                    text, 
                    img: (qObj.optionImages ? qObj.optionImages[idx] : null),
                    origIdx: idx 
                }));
                optObjs.sort(() => Math.random() - 0.5);

                document.getElementById(`opt-${pIdx}`).innerHTML = optObjs.map((obj, idx) => `
                    <button class="option-btn" id="p${pIdx}-opt-${idx}" onpointerdown="handleAnswer(${pIdx}, ${obj.origIdx}, ${qObj.correctIdx}, 'p${pIdx}-opt-${idx}')">
                        ${obj.img ? `<img src="${obj.img}" class="opt-img-game">` : ''}
                        <span>${obj.text}</span>
                    </button>
                `).join('');
            });
        }

        function handleAnswer(pIdx, selectedOrigIdx, correctOrigIdx, btnId) {
            if (isGameOver || isProcessingAnswer[pIdx]) return;
            if (gameMode === 'turn' && pIdx !== currentTurn) return;

            isProcessingAnswer[pIdx] = true;
            const opponentIdx = pIdx === 0 ? 1 : 0;
            const clickedBtn = document.getElementById(btnId);
            
            if (selectedOrigIdx !== correctOrigIdx) {
                clickedBtn.classList.add('btn-wrong');
                document.getElementById(`sfx-p${pIdx+1}-lose`).play();
                triggerDamageFeedback(pIdx);
                updateHP(pIdx, -(damagePerHit * 0.25)); 
                setTimeout(() => {
                    isProcessingAnswer[pIdx] = false;
                    if (gameMode === 'turn') { currentTurn = opponentIdx; updateTurnUI(); }
                }, 1000);
                return;
            }

            clickedBtn.classList.add('btn-correct');
            document.getElementById(`sfx-p${pIdx+1}-attack`).play();
            const myWrap = document.getElementById(`wrapper-${pIdx}`);
            const myDisplay = document.getElementById(`avatar-${pIdx}`);
            const charNum = playerSelection[pIdx];
            
            myDisplay.style.backgroundImage = `url(a${charNum}.gif?t=${Date.now()})`;
            let dashDistance = (pIdx === 0) ? 500 : -500;
            let baseMirror = (pIdx === 0) ? -1 : 1; 
            myWrap.style.transform = `translateX(${dashDistance}px) scaleX(${baseMirror}) scale(1.08)`;
            
            setTimeout(() => {
                applyMirroring(pIdx, myWrap);
                triggerDamageFeedback(opponentIdx);
                updateHP(opponentIdx, -damagePerHit);
                myDisplay.style.backgroundImage = `url(s${charNum}.gif)`;
                isProcessingAnswer[0] = false;
                isProcessingAnswer[1] = false;
                if (gameMode === 'turn') currentTurn = opponentIdx;
                currentQuestionIndex++;
                loadUniversalQuestion();
                updateTurnUI();
            }, 800); 
        }

        function triggerDamageFeedback(pIdx) {
            const side = document.getElementById(`side-${pIdx}`);
            const bar = document.getElementById(`hp-${pIdx}`);
            const avatar = document.getElementById(`avatar-${pIdx}`);
            side.classList.add('damage-flash-screen'); bar.classList.add('damage-flash-bar'); avatar.classList.add('shiver');
            setTimeout(() => { side.classList.remove('damage-flash-screen'); bar.classList.remove('damage-flash-bar'); avatar.classList.remove('shiver'); }, 600);
        }

        function updateHP(pIdx, change) {
            gameData[pIdx].hp = Math.max(0, Math.min(100, gameData[pIdx].hp + change));
            document.getElementById(`hp-${pIdx}`).style.width = gameData[pIdx].hp + '%';
            if (gameData[pIdx].hp <= 0 && !isGameOver) {
                isGameOver = true;
                const winnerIdx = (pIdx === 0 ? 1 : 0);
                setTimeout(() => { endGame(winnerIdx); }, 1500);
            }
        }

        function endGame(winnerIdx) {
            const winnerName = (winnerIdx === 0 ? "PLAYER 1" : "PLAYER 2");
            const winnerChar = playerSelection[winnerIdx];
            document.getElementById('winner-announcement').innerText = winnerName + " VICTORIOUS!";
            document.getElementById('winner-char-display').style.backgroundImage = `url(s${winnerChar}.gif)`;
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
        }

        function goBackToStart() {
            isGameOver = false; isProcessingAnswer = [false, false]; playerSelection = [null, null];
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('char-select-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('intro-screen').style.display = 'flex';
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected-p1', 'selected-p2'));
            document.getElementById('p1-indicator').innerText = "P1: SCANNING...";
            document.getElementById('p2-indicator').innerText = "P2: WAITING...";
            document.getElementById('start-battle-btn').style.visibility = 'hidden';
        }

        function toggleMusic() {
            const bgm = document.getElementById('bg-music');
            if(bgm.paused) { bgm.play(); document.getElementById('music-toggle').innerText = "🔊"; } 
            else { bgm.pause(); document.getElementById('music-toggle').innerText = "🔇"; }
        }
        function changeVolume(val) { document.getElementById('bg-music').volume = val; }
        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        function openSettings() { renderSentenceBank(); document.getElementById('settings-modal').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function closeSettingsAndSync() {
            syncActivePool();
            if(document.getElementById('game-screen').style.display === 'flex') loadUniversalQuestion();
            closeSettings();
        }

        function renderSentenceBank() {
            const container = document.getElementById('sentence-container');
            container.innerHTML = sentenceBank.map((item, qIdx) => `
                <div class="sentence-row">
                    <div class="row-controls">
                        <span class="control-icon" onpointerdown="deleteSentence(${qIdx})" style="color:var(--p1-color); font-size:28px; line-height: 1;">×</span>
                        <span class="control-icon" onpointerdown="duplicateSentence(${qIdx})" style="color:var(--p2-color); font-size:20px;" title="Duplicate Entry">⧉</span>
                    </div>
                    <div style="display:flex; gap:15px; align-items:start;">
                        <div class="armory-img-preview" id="preview-${qIdx}" style="background-image: url(${item.image || ''})" onpointerdown="triggerImageUpload(${qIdx}, 'q')">
                             ${!item.image ? '<span style="font-size:12px; color:#666;">UPLOAD</span>' : ''}
                        </div>
                        <div style="flex-grow:1; padding-right: 40px;">
                            <input type="text" value="${item.text}" oninput="sentenceBank[${qIdx}].text=this.value" placeholder="Question Text" style="width:100%; padding:8px; background:#111; color:white; border:1px solid #444; border-radius:5px; margin-bottom:10px; font-family:'Fredoka'; box-sizing: border-box;">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                                ${item.options.map((opt, oIdx) => `
                                    <div class="opt-row">
                                        <input type="radio" name="correct-radio-${qIdx}" ${oIdx === item.correctIdx ? 'checked' : ''} onchange="setCorrectAnswer(${qIdx}, ${oIdx})">
                                        <div class="opt-mini-preview" style="background-image: url(${item.optionImages ? item.optionImages[oIdx] : ''})" onpointerdown="triggerImageUpload(${qIdx}, 'o', ${oIdx})"></div>
                                        <input type="text" value="${opt}" oninput="updateOption(${qIdx}, ${oIdx}, this.value)" style="background:#111; color:white; border:1px solid #444; padding:5px; border-radius:4px; width:100%; font-family:'Fredoka';" placeholder="Option ${oIdx+1}">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    <input type="file" id="upload-q-${qIdx}" style="display:none" accept="image/*" onchange="handleImageUpload(event, ${qIdx}, 'q')">
                    ${[0,1,2,3].map(i => `<input type="file" id="upload-o-${qIdx}-${i}" style="display:none" accept="image/*" onchange="handleImageUpload(event, ${qIdx}, 'o', ${i})">`).join('')}
                </div>
            `).join('');
        }

        function setCorrectAnswer(qIdx, oIdx) {
            sentenceBank[qIdx].correctIdx = oIdx;
            sentenceBank[qIdx].correct = sentenceBank[qIdx].options[oIdx];
        }

        function triggerImageUpload(qIdx, type, oIdx = 0) {
            if(type === 'q') document.getElementById(`upload-q-${qIdx}`).click();
            else document.getElementById(`upload-o-${qIdx}-${oIdx}`).click();
        }

        function handleImageUpload(event, qIdx, type, oIdx = 0) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    if(type === 'q') sentenceBank[qIdx].image = e.target.result;
                    else {
                        if(!sentenceBank[qIdx].optionImages) sentenceBank[qIdx].optionImages = [null,null,null,null];
                        sentenceBank[qIdx].optionImages[oIdx] = e.target.result;
                    }
                    renderSentenceBank();
                };
                reader.readAsDataURL(file);
            }
        }

        function updateOption(qIdx, oIdx, val) {
            sentenceBank[qIdx].options[oIdx] = val;
            if(sentenceBank[qIdx].correctIdx === oIdx) {
                sentenceBank[qIdx].correct = val;
            }
        }

        function addSentenceRow() { 
            sentenceBank.push({ text: "", options: ["", "", "", ""], optionImages: [null,null,null,null], correct: "", correctIdx: 0, image: null }); 
            renderSentenceBank(); 
        }

        function duplicateSentence(i) {
            const clone = JSON.parse(JSON.stringify(sentenceBank[i]));
            sentenceBank.splice(i + 1, 0, clone);
            renderSentenceBank();
        }

        function deleteSentence(i) { sentenceBank.splice(i, 1); renderSentenceBank(); }
        
        function exportData() {
            const blob = new Blob([JSON.stringify(sentenceBank)], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "BattleQuizData.json"; a.click();
        }
        function importData(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                try { 
                    const data = JSON.parse(e.target.result);
                    sentenceBank = data.map(q => ({
                        ...q,
                        correctIdx: q.correctIdx !== undefined ? q.correctIdx : q.options.indexOf(q.correct)
                    }));
                    syncActivePool();
                    renderSentenceBank(); 
                    if(document.getElementById('game-screen').style.display === 'flex') loadUniversalQuestion();
                } catch(err) { alert("Invalid File Format!"); } 
            };
            reader.readAsText(input.files[0]);
        }
        function resetData() { if(confirm("Wipe data?")) { sentenceBank = JSON.parse(JSON.stringify(DEFAULT_BANK)); syncActivePool(); renderSentenceBank(); } }
    </script>
</body>
</html>
